<html>

<head>
    <title>Happy Birthday, Joalan!</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary Meta Tags -->
    <meta name="title" content="Happy Birthday, Joalan!">
    <meta name="description" content="An interactive birthday celebration just for you!">

    <!-- Open Graph / Facebook / Instagram -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tasdidnoor.com/Happy-Birthday/">
    <meta property="og:title" content="Happy Birthday, Joalan!">
    <meta property="og:description" content="Click to start the celebration!">
    <meta property="og:image" content="https://tasdidnoor.com/Happy-Birthday/img/cake.gif">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://tasdidnoor.com/Happy-Birthday/">
    <meta property="twitter:title" content="Happy Birthday, Joalan!">
    <meta property="twitter:description" content="Click to start the celebration!">
    <meta property="twitter:image" content="https://tasdidnoor.com/Happy-Birthday/img/cake.gif">

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="loader">
                <button id="play">Start</button>
            </div>
        </div>
    </div>
    <audio class="song" controls loop>
        <source src="music.mp3">
        </source>
        Your browser isn't invited for super fun audio time.
    </audio>
    <canvas id="confetti"></canvas>
    <div class="main">
        <div class="container pt-5">
            <div class="row">

                <div class="col-12 col-xl-6 mx-auto">
                    <img src="img/banner.png" alt="">
                </div>

                <div class="col-12  text-center">
                    <div id="name" class="area">Joalan</div>
                </div>

                <div class="col-12 text-center">
                    <div class="type-wrap">
                        <div id="typed-strings" class="typing">
                            <h2>Happy Birthday <i id="nae">Joalan</i></h2>
                            <h2>Have a wonderful day</h2>
                            <h2>Filled with joy and happiness.</h2>
                        </div>
                        <span id="typed" style="white-space:pre;"></span>
                    </div>
                </div>

                <div class="col-12 cake">
                    <img src="img/cake.gif" alt="" style="width: 150px;">
                </div>

                <div class="col-12 text-center">
                    <a href="letter.html" class="letter-btn">Read your birthday letter</a>
                </div>
            </div>
        </div>
        <img src="img/Balloon-Border.png" width="100%" class="balloon-border">
    </div>
</body>
<script src="https://unpkg.com/magic-snowflakes/dist/snowflakes.min.js"></script>
<script src="js/jquery.js"></script>
<script src="js/typed.min.js"></script>
<script src="js/script.js"></script>

</html>
